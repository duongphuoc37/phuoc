<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Cưới Của Chúng Mình</title>
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #fdfaf6; color: #4a4a4a; text-align: center; }
        
        /* Hero Section */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-family: 'Pattaya', sans-serif; font-size: 3.5rem; color: #5d7a64; margin: 10px 0; }
        .date { font-size: 1.2rem; letter-spacing: 2px; }
        
        /* Section styling */
        .section { padding: 50px 20px; }
        .btn-rsvp { background: #5d7a64; color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; font-weight: bold; }
        
        /* Hiệu ứng mượt */
        .fade-in { animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Phần 1: Ảnh bìa & Tên -->
    <div class="hero fade-in">
        <p>Trân trọng kính mời</p>
        <h1>Minh Quân & Thu Hà</h1>
        <div class="date">24 tháng 5, 2026</div>
    </div>

    <!-- Phần 2: Nội dung -->
    <div class="section">
        <h2>Câu chuyện tình yêu</h2>
        <p>Chúng mình đã cùng nhau đi qua những ngày nắng gió...</p>
    </div>

    <!-- Phần 3: Lời mời tham dự -->
    <div class="section">
        <h2>Địa điểm & Thời gian</h2>
        <p>Nhà hàng Tiệc cưới sang trọng<br>Số 1, Đường Hạnh Phúc, Hà Nội</p>
        <br>
        <a href="mailto:your-email@example.com" class="btn-rsvp">Xác nhận tham dự</a>
    </div>

</body>
</html>
