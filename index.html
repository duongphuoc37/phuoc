<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Cưới Minh Quân & Thu Hà</title>
    <!-- Google Fonts cho chữ đẹp -->
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #fdfaf6; color: #4a6741; text-align: center; overflow-x: hidden; }
        
        /* Cấu hình hoa văn */
        .flower-decor { width: 150px; position: absolute; z-index: 1; }
        .top-left { top: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; transform: rotate(180deg); }

        .container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        h1 { font-family: 'Pattaya', sans-serif; font-size: 3rem; margin: 10px 0; }
        .date { font-size: 1.5rem; border-top: 1px solid #4a6741; border-bottom: 1px solid #4a6741; padding: 10px 20px; display: inline-block; }
        
        /* Hiệu ứng mờ dần */
        .content { animation: fadeIn 2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Hoa văn trang trí (Thay link ảnh của bạn vào đây) -->
    <img src="https://cdn-icons-png.flaticon.com/512/3673/3673012.png" class="flower-decor top-left">
    <img src="https://cdn-icons-png.flaticon.com/512/3673/3673012.png" class="flower-decor bottom-right">

    <div class="container content">
        <p>Trân trọng kính mời</p>
        <h1>Minh Quân & Thu Hà</h1>
        <div class="date">24 tháng 5, 2026</div>
        <p style="margin-top: 20px;">Chúng mình rất mong sự hiện diện của bạn!</p>
    </div>

</body>
</html>
