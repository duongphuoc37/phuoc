<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Cưới Sang Trọng</title>
    <!-- Font chữ chuẩn thiệp cưới -->
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&family=Lora:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Reset cơ bản */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fdfaf6; font-family: 'Lora', serif; color: #4a6741; overflow-x: hidden; }

        /* Khung thiệp */
        .page { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

        /* Hoa văn ở góc (Đây là thứ tạo nên hồn bản gốc) */
        .flower-tl { position: absolute; top: 30px; left: 30px; width: 150px; opacity: 0.8; }
        .flower-br { position: absolute; bottom: 30px; right: 30px; width: 150px; opacity: 0.8; transform: rotate(180deg); }

        /* Tên cô dâu chú rể */
        .names { font-family: 'Pattaya', sans-serif; font-size: 3.5rem; margin: 20px 0; }
        
        /* Hiệu ứng mờ dần */
        .fade-in { animation: fadeIn 2.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .divider { width: 40px; height: 1px; background: #4a6741; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- Hoa văn gốc (Thay link ảnh hoa văn bạn tải về vào đây) -->
    <img src="https://chungdoi.com/images/themes/boho-floral-green/flower.webp" class="flower-tl">
    <img src="https://chungdoi.com/images/themes/boho-floral-green/flower.webp" class="flower-br">

    <div class="page fade-in">
        <p>Trân trọng kính mời</p>
        <div class="names">Minh Quân & Thu Hà</div>
        <div class="divider"></div>
        <p>24 tháng 5, 2026</p>
    </div>

</body>
</html>
